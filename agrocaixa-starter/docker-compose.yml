services:
  postgres:
    image: postgres:16
    container_name: agrocaixa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agrocaixa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./services/api
    container_name: agrocaixa-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - ai
    volumes:
      - ./services/api:/app

  ai:
    build: ./services/ai
    container_name: agrocaixa-ai
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      - postgres
    volumes:
      - ./services/ai:/app

  web:
    build: ./services/apps/web
    container_name: agrocaixa-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3000"
    depends_on:
      - api
    volumes:
      - ./services/apps/web:/app

volumes:
  postgres_data:
